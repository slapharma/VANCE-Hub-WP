<script>
(function(){
  if (window.parent === window) return;
  function collectPlan(){
    var root = document.body;
    var text = (root.innerText||'').replace(/\s+/g,' ').trim().slice(0, 4000);
    var html = (root.innerHTML||'').slice(0, 8000);
    return { title: document.title || 'IBD Meal Plan', snapshot: text, html: html, url: location.href };
  }
  function addBtn(){
    if (document.getElementById('vance-save-btn')) return;
    var b = document.createElement('button');
    b.id='vance-save-btn';
    b.textContent='Save plan to my profile';
    b.style.cssText='position:fixed;right:16px;bottom:16px;z-index:99999;background:#008080;color:white;border:none;padding:10px 16px;font-weight:700;font-family:sans-serif;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,0.25);cursor:pointer;border-radius:0;';
    b.onclick=function(){
      var d = collectPlan();
      window.parent.postMessage({ type:'VANCE_SAVE_MEAL_PLAN', id:'mp_'+Date.now(), date:new Date().toISOString(), title:d.title, snapshot:d.snapshot, html:d.html, url:d.url }, '*');
      b.textContent='Saved!';
      setTimeout(function(){ b.textContent='Save plan to my profile'; }, 2000);
    };
    document.body.appendChild(b);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', addBtn); else addBtn();
  setTimeout(addBtn, 1500);
})();
</script>
